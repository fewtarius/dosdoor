name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make flex bison libslang2-dev

      - name: Build
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          ./build.sh

      - name: Verify binary
        run: |
          file build/bin/dosdoor
          build/bin/dosdoor --version || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-linux-x86_64
          path: build/bin/dosdoor

      - name: Create source tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf /tmp/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' --exclude='tests' \
            --exclude='*.o' --exclude='*.a' --exclude='*.d' \
            --exclude='build' --exclude='lib' \
            .
          mv /tmp/dosdoor-${VERSION}.tar.gz .

      - name: Upload source tarball
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-source
          path: dosdoor-*.tar.gz

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make flex bison libslang2-dev rpm

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y%m%d).0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup RPM build tree
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
          VERSION="${{ steps.version.outputs.version }}"
          tar czf ~/rpmbuild/SOURCES/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' --exclude='tests' \
            .
          cp dosdoor.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          rpmbuild -bb --nodeps ~/rpmbuild/SPECS/dosdoor.spec \
            --define "version ${VERSION}" \
            --define "_topdir $HOME/rpmbuild"

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-rpm
          path: ~/rpmbuild/RPMS/**/*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-rpm]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dosdoor-linux-x86_64/dosdoor
            dosdoor-rpm/**/*.rpm
            dosdoor-source/*.tar.gz
          generate_release_notes: true
