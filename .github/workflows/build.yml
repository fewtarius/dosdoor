name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make flex bison libslang2-dev

      - name: Build
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          ./build.sh

      - name: Verify binary
        run: |
          file build/bin/dosdoor
          build/bin/dosdoor --version || true

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-linux-x86_64
          path: build/bin/dosdoor

      - name: Create source tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf /tmp/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' \
            --exclude='*.o' --exclude='*.a' --exclude='*.d' \
            --exclude='build' --exclude='lib' \
            --exclude='Makefile.conf' --exclude='config.status' \
            --exclude='config.log' --exclude='confdefs.h' \
            .
          mv /tmp/dosdoor-${VERSION}.tar.gz .

      - name: Upload source tarball
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-source
          path: dosdoor-*.tar.gz

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y%m%d).0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build RPM in Rocky 9 container
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p rpm-output

          # create source tarball excluding configure output
          tar czf /tmp/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' \
            --exclude='*.o' --exclude='*.a' --exclude='*.d' \
            --exclude='build' --exclude='lib' \
            --exclude='Makefile.conf' --exclude='config.status' \
            --exclude='config.log' --exclude='confdefs.h' \
            .

          # build RPM inside Rocky 9 so binary links against GLIBC 2.34
          docker run --rm \
            -v /tmp/dosdoor-${VERSION}.tar.gz:/tmp/dosdoor-${VERSION}.tar.gz:ro \
            -v ${{ github.workspace }}/dosdoor.spec:/tmp/dosdoor.spec:ro \
            -v ${{ github.workspace }}/rpm-output:/output \
            rockylinux:9 bash -c "
              yum -y install gcc make flex bison slang-devel rpm-build &&
              mkdir -p /root/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS} &&
              cp /tmp/dosdoor-${VERSION}.tar.gz /root/rpmbuild/SOURCES/ &&
              cp /tmp/dosdoor.spec /root/rpmbuild/SPECS/ &&
              rpmbuild -bb /root/rpmbuild/SPECS/dosdoor.spec \
                --define 'version ${VERSION}' \
                --define '_topdir /root/rpmbuild' &&
              cp /root/rpmbuild/RPMS/*/*.rpm /output/
            "

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-rpm
          path: rpm-output/*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-rpm]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dosdoor-linux-x86_64/dosdoor
            dosdoor-rpm/**/*.rpm
            dosdoor-source/*.tar.gz
          generate_release_notes: true
