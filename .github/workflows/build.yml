name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make flex bison libslang2-dev

      - name: Build
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          ./build.sh

      - name: Verify binary
        run: |
          file build/bin/dosdoor
          build/bin/dosdoor --version || true

      - name: Verify source layout
        run: |
          chmod +x tests/verify-install.sh
          tests/verify-install.sh --source

      - name: Verify install layout
        run: |
          make install DESTDIR=/tmp/dosdoor-install
          tests/verify-install.sh /tmp/dosdoor-install/usr

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-linux-x86_64
          path: build/bin/dosdoor

      - name: Create source tarball
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          tar czf /tmp/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' \
            --exclude='*.o' --exclude='*.a' --exclude='*.d' \
            --exclude='build' --exclude='lib' \
            --exclude='Makefile.conf' --exclude='config.status' \
            --exclude='config.log' --exclude='confdefs.h' \
            .
          mv /tmp/dosdoor-${VERSION}.tar.gz .

      - name: Upload source tarball
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-source
          path: dosdoor-*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install s-lang

      - name: Build
        run: |
          chmod +x build.sh mkpluginhooks bisonpp.pl install-sh
          ./build.sh

      - name: Verify binary
        run: |
          file build/bin/dosdoor
          build/bin/dosdoor --version || true

      - name: Verify source layout
        run: |
          chmod +x tests/verify-install.sh
          tests/verify-install.sh --source

      - name: Verify install layout
        run: |
          make install DESTDIR=/tmp/dosdoor-install
          tests/verify-install.sh /tmp/dosdoor-install/usr/local

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-macos-arm64
          path: build/bin/dosdoor

  build-rpm:
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(date +%Y%m%d).0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build RPM in Rocky 9 container
        run: |
          chmod +x build.sh configure mkpluginhooks bisonpp.pl install-sh
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p rpm-output

          # create source tarball excluding configure output
          tar czf /tmp/dosdoor-${VERSION}.tar.gz \
            --transform "s,^,dosdoor-${VERSION}/," \
            --exclude='.git' --exclude='.github' --exclude='.clio' \
            --exclude='ai-assisted' --exclude='scratch' \
            --exclude='*.o' --exclude='*.a' --exclude='*.d' \
            --exclude='build' --exclude='lib' \
            --exclude='Makefile.conf' --exclude='config.status' \
            --exclude='config.log' --exclude='confdefs.h' \
            .

          # build RPM inside Rocky 9 so binary links against GLIBC 2.34
          docker run --rm \
            -v /tmp/dosdoor-${VERSION}.tar.gz:/tmp/dosdoor-${VERSION}.tar.gz:ro \
            -v ${{ github.workspace }}/dosdoor.spec:/tmp/dosdoor.spec:ro \
            -v ${{ github.workspace }}/rpm-output:/output \
            rockylinux:9 bash -c "
              yum -y install gcc make flex bison slang-devel rpm-build &&
              mkdir -p /root/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS} &&
              cp /tmp/dosdoor-${VERSION}.tar.gz /root/rpmbuild/SOURCES/ &&
              cp /tmp/dosdoor.spec /root/rpmbuild/SPECS/ &&
              rpmbuild -bb /root/rpmbuild/SPECS/dosdoor.spec \
                --define 'version ${VERSION}' \
                --define '_topdir /root/rpmbuild' &&
              cp /root/rpmbuild/RPMS/*/*.rpm /output/
            "

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: dosdoor-rpm
          path: rpm-output/*.rpm

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-rpm]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Rename binaries for release
        run: |
          mv dosdoor-linux-x86_64/dosdoor dosdoor-linux-x86_64/dosdoor-linux-x86_64
          mv dosdoor-macos-arm64/dosdoor dosdoor-macos-arm64/dosdoor-macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dosdoor-linux-x86_64/dosdoor-linux-x86_64
            dosdoor-macos-arm64/dosdoor-macos-arm64
            dosdoor-rpm/**/*.rpm
            dosdoor-source/*.tar.gz
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          HOMEBREW_PAT: ${{ secrets.HOMEBREW_PAT }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          URL="https://github.com/${REPO}/archive/refs/tags/${TAG}.tar.gz"

          # download the source archive and compute sha256
          curl -sL "$URL" -o /tmp/src.tar.gz
          SHA=$(sha256sum /tmp/src.tar.gz | awk '{print $1}')
          echo "Source archive SHA256: ${SHA}"

          git clone "https://x-access-token:${HOMEBREW_PAT}@github.com/fewtarius/homebrew-tap.git" tap-repo
          cd tap-repo

          sed -i "s|url \".*\"|url \"${URL}\"|"       Formula/dosdoor.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA}\"|" Formula/dosdoor.rb

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/dosdoor.rb
          git diff --cached --quiet && echo "No formula changes needed" && exit 0
          git commit -m "dosdoor: update to ${TAG}"
          git push
